<form class="card" [formGroup]="form" (ngSubmit)="submit()">
  <h2>Login</h2>

  <div
    class="form-control"
    [ngClass]="{invalid: form.get('email')?.touched && form.get('email')?.invalid}"
  >
    <label for="email">Email:</label>
    <input id="email" type="email" formControlName="email">
    <div
      *ngIf="form.get('email')?.touched && form.get('email')?.invalid"
      class="validation"
    >
      <small *ngIf="form.get('email')?.errors?.required">Email is required</small>
      <small *ngIf="form.get('email')?.errors?.email">Email should be correct</small>
    </div>
  </div>

  <div
    class="form-control"
    [ngClass]="{invalid: form.get('password')?.touched && form.get('password')?.invalid}"
  >
    <label for="password">Password:</label>
    <input id="password" type="password" formControlName="password">
    <div
      *ngIf="form.get('password')?.touched && form.get('password')?.invalid"
      class="validation"
    >
      <small *ngIf="form.get('password')?.errors?.required">Password is required</small>
      <small *ngIf="form.get('password')?.errors?.minlength">
        Password shouldn't be less than {{requiredPasswordLength}} symbols.
        Now it's {{form.get('password')?.errors?.minlength.actualLength}} symbols
      </small>
    </div>
  </div>

  <button
    type="submit"
    class="btn btn-primary"
    [disabled]="form.invalid"
  >login
  </button>
</form>
